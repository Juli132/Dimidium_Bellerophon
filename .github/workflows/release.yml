name: Create Release Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            archive_cmd: 7z a -tzip ../Dimidium-${{ github.ref_name }}-windows.zip *
            asset_name: Dimidium-${{ github.ref_name }}-windows.zip
          - os: ubuntu-latest
            archive_cmd: tar -czvf ../Dimidium-${{ github.ref_name }}-linux.tar.gz .
            asset_name: Dimidium-${{ github.ref_name }}-linux.tar.gz

    runs-on: ${{ matrix.os }} 
    
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 19
      uses: actions/setup-java@v4
      with:
        java-version: '19'
        distribution: 'temurin'
        cache: maven

    - name: Build the JAR with Maven
      run: mvn -B clean package --file pom.xml

    - name: Create custom JRE with jlink
      run: |
        jlink --module-path $JAVA_HOME/jmods \
              --add-modules java.base,java.logging,java.sql,java.desktop \
              --output custom-jre \
              --compress=2 \
              --no-header-files \
              --no-man-pages

    - name: Prepare Release Package
      run: |
        mkdir release-package
        cp target/SyntaxN.jar release-package/ 
        cp run.bat release-package/
        cp run.sh release-package/
        cp -r webpage release-package/
        cp -r custom-jre release-package/jre

    - name: Create Archive
      run: |
        cd release-package
        ${{ matrix.archive_cmd }}

    - name: Auto-Create Release (As Draft)
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        generate_release_notes: true
        files: ${{ matrix.asset_name }}
