name: Create Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 19
      uses: actions/setup-java@v4
      with:
        java-version: '19'
        distribution: 'temurin'
        cache: maven

    - name: Build the JAR with Maven
      run: mvn -B clean package --file pom.xml

    - name: Create custom JRE with jlink
      run: |
        jlink --module-path $JAVA_HOME/jmods \
              --add-modules java.base,java.logging,java.sql,java.desktop \
              --output custom-jre \
              --compress=2 \
              --no-header-files \
              --no-man-pages

    - name: Prepare Release Package
      run: |
        mkdir release-package
        cp target/*.jar release-package/
        cp run.bat release-package/
        cp run.sh release-package/
        cp -r webpage release-package/
        cp -r custom-jre release-package/jre

    - name: Create ZIP
      run: |
        cd release-package
        zip -r ../Dimidium-${{ github.ref_name }}.zip .

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: Dimidium-${{ github.ref_name }}.zip
